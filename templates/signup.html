<!-- templates/signup.html -->

<!DOCTYPE html>
<html>
<head>

    <title>Signup</title>

    <style>

        body{
            margin:0;
            padding:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f0f0f;
            font-family:Arial;
        }

        .box{
            width:350px;
            background:#1b1b1b;
            padding:40px;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(255,255,255,0.1);
        }

        h1{
            color:white;
            text-align:center;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:12px;
            margin-top:15px;
            border:none;
            border-radius:8px;
            background:#2b2b2b;
            color:white;
        }

        button{
            width:100%;
            padding:12px;
            margin-top:20px;
            border:none;
            border-radius:8px;
            background:#ff0000;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#cc0000;
        }

        p{
            color:white;
            text-align:center;
            margin-top:20px;
        }

        a{
            color:#00bfff;
            text-decoration:none;
        }

        .error{
            color:red;
            text-align:center;
        }

    </style>

</head>

<body>

<div class="box">

    <h1>Create Account</h1>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Signup</button>

    </form>

    <p>
        Already have account?
        <a href="/login/">Login</a>
    </p>

</div>

</body>
</html>
